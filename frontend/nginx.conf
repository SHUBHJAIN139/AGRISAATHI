server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to backend
    location /chat {
        proxy_pass http://api-gateway:8080;
    }
    location /diagnose {
        proxy_pass http://api-gateway:8080;
    }
    location /health {
        proxy_pass http://api-gateway:8080;
    }
    location /token {
        proxy_pass http://api-gateway:8080;
    }
    location /session {
        proxy_pass http://api-gateway:8080;
    }
}
